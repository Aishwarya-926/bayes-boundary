<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multivariate Bayesian Decision Boundary</title>
    <!-- Load Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --panel-bg: #ffffff;
            --primary: #2c3e50;
            --c1: #e74c3c; /* Red */
            --c1-light: #fadbd8;
            --c2: #3498db; /* Blue */
            --c2-light: #d6eaf8;
            --db: #10b981; /* Green */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { margin-top: 0; font-weight: 700; color: #1a252f; text-align: center;}
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }

        .dashboard {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }

        .sidebar {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .card h3 { margin-top: 0; font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 8px;}
        .c1-title { color: var(--c1); }
        .c2-title { color: var(--c2); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4a5568;}

        .matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
        }

        .matrix-grid input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-family: monospace;
            text-align: center;
            font-size: 14px;
            transition: border 0.2s;
        }

        .matrix-grid input:focus { outline: none; border-color: #a0aec0; }
        .matrix-grid input[readonly] { background-color: #e2e8f0; color: #718096; cursor: not-allowed; }

        input[type=range] { width: 100%; cursor: pointer; }
        
        .plot-container {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #plot2d { width: 100%; height: 750px; }

        #error-banner {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Interactive Bayesian Decision Boundaries</h2>
    <p class="subtitle">Adjust Covariance Matrices (Σ), Means (μ), and Priors to see linear and quadratic boundaries.</p>

    <div class="dashboard">
        <!-- CONTROLS SIDEBAR -->
        <div class="sidebar">
            
            <div id="error-banner">Invalid Covariance Matrix! Must be Positive-Definite (Det > 0).</div>

            <!-- Global Settings -->
            <div class="card">
                <h3>Global Parameters</h3>
                <div class="input-group">
                    <label>Prior Probability P(C1): <span id="prior1_val" style="color:var(--c1)">0.50</span></label>
                    <input type="range" id="prior1" min="0.05" max="0.95" step="0.01" value="0.5">
                    <div style="font-size:12px; color:#718096; text-align:right; margin-top:4px;">
                        P(C2): <span id="prior2_val" style="color:var(--c2)">0.50</span>
                    </div>
                </div>
            </div>

            <!-- Class 1 -->
            <div class="card">
                <h3 class="c1-title">Class 1 (Red)</h3>
                <div class="input-group">
                    <label>Mean Vector [μx, μy]</label>
                    <div class="matrix-grid">
                        <input type="number" step="0.5" id="c1_mu_x" value="-2">
                        <input type="number" step="0.5" id="c1_mu_y" value="-2">
                    </div>
                </div>
                <div class="input-group">
                    <label>Covariance Matrix Σ₁</label>
                    <div class="matrix-grid">
                        <input type="number" step="0.5" id="c1_xx" value="2.0">
                        <input type="number" step="0.5" id="c1_xy" value="0.0">
                        <input type="number" step="0.5" id="c1_yx" value="0.0" readonly>
                        <input type="number" step="0.5" id="c1_yy" value="2.0">
                    </div>
                </div>
            </div>

            <!-- Class 2 -->
            <div class="card">
                <h3 class="c2-title">Class 2 (Blue)</h3>
                <div class="input-group">
                    <label>Mean Vector[μx, μy]</label>
                    <div class="matrix-grid">
                        <input type="number" step="0.5" id="c2_mu_x" value="2">
                        <input type="number" step="0.5" id="c2_mu_y" value="2">
                    </div>
                </div>
                <div class="input-group">
                    <label>Covariance Matrix Σ₂</label>
                    <div class="matrix-grid">
                        <input type="number" step="0.5" id="c2_xx" value="2.0">
                        <input type="number" step="0.5" id="c2_xy" value="0.0">
                        <input type="number" step="0.5" id="c2_yx" value="0.0" readonly>
                        <input type="number" step="0.5" id="c2_yy" value="2.0">
                    </div>
                </div>
            </div>
        </div>

        <!-- PLOT AREA -->
        <div class="plot-container">
            <div id="plot2d"></div>
        </div>
    </div>

    <script>
        // Sync symmetric covariance inputs
        document.getElementById('c1_xy').addEventListener('input', function(e) { document.getElementById('c1_yx').value = e.target.value; });
        document.getElementById('c2_xy').addEventListener('input', function(e) { document.getElementById('c2_yx').value = e.target.value; });

        // Add event listeners to all inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => input.addEventListener('input', updatePlots));

        // 2D Gaussian PDF Calculation
        function getGaussian2D(x, y, mu_x, mu_y, cov, prior) {
            let dx = x - mu_x;
            let dy = y - mu_y;
            
            // Quadratic form: (x-mu)^T * Sigma^-1 * (x-mu)
            let q = cov.inv_xx * dx * dx + 2 * cov.inv_xy * dx * dy + cov.inv_yy * dy * dy;
            
            return prior * cov.norm_factor * Math.exp(-0.5 * q);
        }

        // Parse and validate matrix
        function parseMatrix(prefix) {
            let xx = parseFloat(document.getElementById(prefix + '_xx').value);
            let yy = parseFloat(document.getElementById(prefix + '_yy').value);
            let xy = parseFloat(document.getElementById(prefix + '_xy').value);
            
            let det = (xx * yy) - (xy * xy);
            let valid = det > 0 && xx > 0 && yy > 0;

            if(!valid) return { valid: false };

            return {
                valid: true,
                xx: xx, yy: yy, xy: xy,
                det: det,
                inv_xx: yy / det,
                inv_yy: xx / det,
                inv_xy: -xy / det,
                norm_factor: 1 / (2 * Math.PI * Math.sqrt(det))
            };
        }

        function updatePlots() {
            // Update Priors text
            const prior1 = parseFloat(document.getElementById('prior1').value);
            const prior2 = 1.0 - prior1;
            document.getElementById('prior1_val').innerText = prior1.toFixed(2);
            document.getElementById('prior2_val').innerText = prior2.toFixed(2);

            // Fetch means
            const mu1 =[parseFloat(document.getElementById('c1_mu_x').value), parseFloat(document.getElementById('c1_mu_y').value)];
            const mu2 =[parseFloat(document.getElementById('c2_mu_x').value), parseFloat(document.getElementById('c2_mu_y').value)];

            // Fetch and validate covariances
            const cov1 = parseMatrix('c1');
            const cov2 = parseMatrix('c2');
            const errorBanner = document.getElementById('error-banner');

            if (!cov1.valid || !cov2.valid) {
                errorBanner.style.display = 'block';
                return; // Stop rendering if matrices are invalid (not positive definite)
            } else {
                errorBanner.style.display = 'none';
            }

            // Generate Grid
            const size = 120; // Higher resolution for smoother curves
            const range = 8;
            const x2d = [], y2d = [], zDiff = [], z1 =[], z2 =[];
            
            for (let i = 0; i < size; i++) {
                x2d.push(-range + (2 * range * i) / (size - 1));
                y2d.push(-range + (2 * range * i) / (size - 1));
            }

            for (let j = 0; j < size; j++) {
                let rowDiff =[], row1 = [], row2 = [];
                let y = y2d[j];
                for (let i = 0; i < size; i++) {
                    let x = x2d[i];
                    let p1 = getGaussian2D(x, y, mu1[0], mu1[1], cov1, prior1);
                    let p2 = getGaussian2D(x, y, mu2[0], mu2[1], cov2, prior2);
                    
                    rowDiff.push(p1 - p2); // DB where this equals 0
                    row1.push(p1);
                    row2.push(p2);
                }
                zDiff.push(rowDiff);
                z1.push(row1);
                z2.push(row2);
            }

            // Traces
            const contour1 = {
                z: z1, x: x2d, y: y2d, type: 'contour',
                colorscale: [[0, 'rgba(231,76,60,0)'], [1, '#e74c3c']],
                contours: { coloring: 'lines', showlabels: false },
                line: { width: 1.5 }, // Aesthetic adjustment: fine distribution lines
                showscale: false, ncontours: 10, hoverinfo: 'none'
            };

            const contour2 = {
                z: z2, x: x2d, y: y2d, type: 'contour',
                colorscale: [[0, 'rgba(52,152,219,0)'], [1, '#3498db']],
                contours: { coloring: 'lines', showlabels: false },
                line: { width: 1.5 }, // Aesthetic adjustment: fine distribution lines
                showscale: false, ncontours: 10, hoverinfo: 'none'
            };

            const boundaryTrace = {
                z: zDiff, x: x2d, y: y2d, type: 'contour',
                colorscale: [[0, '#10b981'],[1, '#10b981']],
                contours: { start: 0, end: 0, size: 1, coloring: 'lines' },
                line: { width: 2.5 }, // Aesthetic adjustment: clear but not overly thick DB
                showscale: false, hoverinfo: 'none'
            };

            // Plotly markers for the Means
            const meansTrace = {
                x: [mu1[0], mu2[0]], y: [mu1[1], mu2[1]],
                mode: 'markers+text',
                text: ['μ₁', 'μ₂'],
                textposition: 'top center',
                marker: { color: ['#e74c3c', '#3498db'], size: 10, symbol: 'cross' },
                type: 'scatter', hoverinfo: 'none'
            };

            const layout = {
                title: { text: '2D Feature Space & Decision Boundary', font: { family: 'Inter', size: 18 } },
                xaxis: { title: 'Feature X₁', range:[-range, range], constrain: 'domain', zerolinecolor: '#e2e8f0', gridcolor: '#f8fafc' },
                yaxis: { title: 'Feature X₂', range: [-range, range], scaleanchor: 'x', scaleratio: 1, zerolinecolor: '#e2e8f0', gridcolor: '#f8fafc' },
                showlegend: false,
                plot_bgcolor: '#ffffff',
                paper_bgcolor: '#ffffff',
                margin: { t: 60, b: 60, l: 60, r: 60 }
            };

            Plotly.react('plot2d', [contour1, contour2, boundaryTrace, meansTrace], layout);
        }

        // Initialize Plot
        updatePlots();
    </script>
</body>
</html>
